<!-- components/buttons.html — RN: components/Button.tsx -->
<link rel="stylesheet" href="../base.css">
<style>
.btn{display:flex;align-items:center;justify-content:center;height:var(--btn-h);border-radius:var(--btn-r);font-size:14px;font-weight:600;border:none;cursor:pointer;width:100%;transition:all .15s}
.btn-primary{background:var(--primary-600);color:var(--white)}
.btn-primary:active{background:var(--primary-700)}
.btn-primary:disabled{background:var(--gray-200);color:var(--gray-400)}
.btn-secondary{background:var(--primary-50);color:var(--primary-600)}
.btn-outline{background:transparent;color:var(--gray-700);border:1.5px solid var(--gray-300)}
.btn-danger{background:var(--error);color:var(--white)}
.btn-lg{height:var(--btn-h-lg);font-size:16px}
.btn-pair{display:flex;gap:var(--sm)}
.btn-pair .btn:first-child{flex:1} .btn-pair .btn:last-child{flex:2}
</style>
<h3>Buttons</h3>
<div style="max-width:340px;display:flex;flex-direction:column;gap:12px">
  <button class="btn btn-primary">Primary (다음 단계)</button>
  <button class="btn btn-primary btn-lg">Primary Large (제출)</button>
  <button class="btn btn-secondary">Secondary (임시저장)</button>
  <button class="btn btn-outline">Outline (취소)</button>
  <button class="btn btn-danger">Danger (삭제)</button>
  <button class="btn btn-primary" disabled>Disabled</button>
  <div class="btn-pair">
    <button class="btn btn-outline">이전</button>
    <button class="btn btn-primary">다음</button>
  </div>
</div>
