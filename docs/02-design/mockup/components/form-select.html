<!-- components/form-select.html — RN: components/FormSelect.tsx -->
<link rel="stylesheet" href="../base.css">
<style>
.form-label{font-size:14px;font-weight:600;color:var(--gray-800);margin-bottom:var(--sm)}.req{color:var(--error)}
.select-grid{display:grid;gap:var(--sm)}.cols-2{grid-template-columns:1fr 1fr}.cols-3{grid-template-columns:1fr 1fr 1fr}
.select-btn{height:var(--input-h);border:1.5px solid var(--gray-300);border-radius:var(--btn-r);background:var(--white);font-size:14px;font-weight:600;color:var(--gray-700);cursor:pointer;display:flex;align-items:center;justify-content:center}
.select-btn.selected{border-color:var(--primary-600);background:var(--primary-50);color:var(--primary-600)}
.select-btn:active{background:var(--primary-100)}
</style>
<h3>FormSelect</h3>
<div style="max-width:340px;display:flex;flex-direction:column;gap:24px">
  <!-- 3개 이하: 3열 -->
  <div>
    <div class="form-label">작물 상태 <span class="req">*</span></div>
    <div class="select-grid cols-3">
      <button class="select-btn selected">양호</button>
      <button class="select-btn">보통</button>
      <button class="select-btn">불량</button>
    </div>
  </div>
  <!-- 4~7개: 2열 -->
  <div>
    <div class="form-label">작물 종류</div>
    <div class="select-grid cols-2">
      <button class="select-btn selected">벼</button>
      <button class="select-btn">밭작물</button>
      <button class="select-btn">과수</button>
      <button class="select-btn">채소</button>
      <button class="select-btn">화훼</button>
      <button class="select-btn">특용작물</button>
      <button class="select-btn">기타</button>
    </div>
  </div>
</div>
