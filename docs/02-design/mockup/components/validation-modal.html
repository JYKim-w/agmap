<!-- components/validation-modal.html — RN: components/ValidationModal.tsx -->
<link rel="stylesheet" href="../base.css">
<style>
.modal-wrap{width:340px;padding:var(--lg);background:rgba(0,0,0,.4);border-radius:12px;display:flex;align-items:center;justify-content:center}
.warn-modal{background:var(--white);border-radius:var(--card-r);width:100%;overflow:hidden}
.warn-modal-header{padding:var(--lg) var(--lg) var(--sm);font-size:17px;font-weight:700}
.warn-modal-body{padding:0 var(--lg) var(--md)}
.warn-item{display:flex;align-items:flex-start;gap:var(--sm);padding:10px 0;border-bottom:1px solid var(--gray-100);font-size:14px}
.warn-item:last-child{border-bottom:none}
.warn-item .w-icon{font-size:16px;flex-shrink:0;margin-top:1px;color:var(--warning)}
.warn-item .w-text{color:var(--gray-700)}.warn-item .w-text strong{color:var(--gray-900)}
.warn-modal-footer{display:flex;border-top:1px solid var(--gray-200)}
.warn-modal-footer button{flex:1;height:52px;border:none;background:transparent;font-size:15px;font-weight:600;cursor:pointer}
.warn-modal-footer button+button{border-left:1px solid var(--gray-200)}
.warn-modal-footer .cancel{color:var(--gray-600)}.warn-modal-footer .submit{color:var(--primary-600)}
</style>
<h3>ValidationModal</h3>
<div class="modal-wrap">
  <div class="warn-modal">
    <div class="warn-modal-header">제출 전 확인</div>
    <div class="warn-modal-body">
      <div class="warn-item"><span class="w-icon">&#9888;</span><div class="w-text"><strong>GPS 거리 경고</strong><br>필지에서 480m 떨어져 있습니다.</div></div>
      <div class="warn-item"><span class="w-icon">&#9888;</span><div class="w-text"><strong>소요시간 경고</strong><br>조사 시작부터 25초 경과.</div></div>
    </div>
    <div style="padding:0 24px 16px;font-size:12px;color:var(--gray-500)">경고 무시 시 검수 관리자에게 표시됩니다.</div>
    <div class="warn-modal-footer"><button class="cancel">돌아가서 수정</button><button class="submit">무시하고 제출</button></div>
  </div>
</div>
