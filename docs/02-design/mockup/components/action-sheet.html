<!-- components/action-sheet.html — RN: components/ActionSheet.tsx -->
<link rel="stylesheet" href="../base.css">
<style>
.as-wrap{position:relative;width:340px;height:280px;background:rgba(0,0,0,.35);border-radius:12px;display:flex;align-items:flex-end;padding:var(--sm)}
.action-sheet{width:100%;display:flex;flex-direction:column;gap:var(--sm)}
.as-group{background:var(--white);border-radius:14px;overflow:hidden}
.as-btn{width:100%;height:56px;border:none;background:transparent;font-size:18px;color:var(--primary-600);cursor:pointer;display:flex;align-items:center;justify-content:center;gap:10px}
.as-btn+.as-btn{border-top:1px solid var(--gray-200)}
.as-btn.cancel{font-weight:600;color:var(--gray-700)}
.as-title{padding:12px 16px;text-align:center;font-size:13px;color:var(--gray-500);border-bottom:1px solid var(--gray-200)}
</style>
<h3>ActionSheet</h3>
<div class="as-wrap">
  <div class="action-sheet">
    <div class="as-group">
      <div class="as-title">사진 유형: 근경 (필수)</div>
      <button class="as-btn">&#128247; 카메라 촬영</button>
      <button class="as-btn">&#128444; 앨범에서 선택</button>
    </div>
    <div class="as-group"><button class="as-btn cancel">취소</button></div>
  </div>
</div>
