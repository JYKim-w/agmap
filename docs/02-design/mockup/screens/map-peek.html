<!-- screens/map-peek.html — RN: app/(tabs)/map.tsx [기본 상태] -->
<!-- 지도 위 오버레이 요소만 정의. 실제 지도는 MapLibre 렌더링. -->
<link rel="stylesheet" href="../base.css">
<style>
.map-wrap{position:relative;width:340px;height:550px;background:#dde8d0;border-radius:12px;overflow:hidden}
.map-search{position:absolute;top:8px;left:16px;right:16px;height:44px;background:var(--white);border-radius:22px;box-shadow:var(--shadow-md);display:flex;align-items:center;padding:0 16px;gap:8px;z-index:10}
.map-search .icon{font-size:16px;color:var(--gray-500)}.map-search .text{font-size:15px;color:var(--gray-400)}
.map-fabs{position:absolute;right:16px;bottom:180px;display:flex;flex-direction:column;gap:12px;z-index:10}
.fab{width:var(--fab-size);height:var(--fab-size);border-radius:24px;background:var(--white);box-shadow:var(--shadow-md);display:flex;align-items:center;justify-content:center;font-size:20px;color:var(--gray-700);cursor:pointer}
.fab.active{color:var(--primary-600)}
.map-legend{position:absolute;left:16px;bottom:180px;background:rgba(255,255,255,.92);border-radius:8px;padding:6px 12px;display:flex;gap:12px;font-size:12px;color:var(--gray-700);z-index:10}
.legend-dot{width:8px;height:8px;border-radius:50%;display:inline-block;margin-right:4px}
.map-marker{position:absolute;width:16px;height:16px;border-radius:50%;border:2px solid var(--white);box-shadow:var(--shadow-sm)}
.bottom-sheet{position:absolute;bottom:0;left:0;right:0;background:var(--white);border-radius:16px 16px 0 0;box-shadow:var(--shadow-lg);height:120px;z-index:20}
.bs-handle{width:36px;height:4px;background:var(--gray-300);border-radius:2px;margin:var(--sm) auto}
.bs-content{padding:var(--sm) var(--lg)}
.bs-addr{font-size:17px;font-weight:600}.bs-meta{font-size:13px;color:var(--gray-600);margin-bottom:var(--sm)}
.bs-action{color:var(--primary-600);font-weight:600;font-size:14px}
.badge{display:inline-flex;padding:var(--xs) var(--sm);border-radius:var(--badge-r);font-size:12px;font-weight:600}
.badge-unsurveyed{background:#fff5f5;color:#fa5252}
</style>
<div class="map-wrap">
  <div class="map-search"><span class="icon">&#128269;</span><span class="text">할당 필지 검색</span></div>
  <div class="map-marker" style="top:80px;left:60px;background:var(--parcel-unsurveyed)"></div>
  <div class="map-marker" style="top:130px;left:180px;background:var(--parcel-completed)"></div>
  <div class="map-marker" style="top:160px;left:100px;background:var(--parcel-in-progress)"></div>
  <div class="map-marker" style="top:200px;left:240px;background:var(--parcel-unsurveyed)"></div>
  <div class="map-marker" style="top:180px;left:50px;background:var(--parcel-rejected)"></div>
  <div class="map-fabs"><div class="fab">&#9776;</div><div class="fab active">&#8982;</div></div>
  <div class="map-legend">
    <span><span class="legend-dot" style="background:var(--parcel-unsurveyed)"></span>미조사</span>
    <span><span class="legend-dot" style="background:var(--parcel-in-progress)"></span>진행중</span>
    <span><span class="legend-dot" style="background:var(--parcel-completed)"></span>완료</span>
    <span><span class="legend-dot" style="background:var(--parcel-rejected)"></span>반려</span>
  </div>
  <div class="bottom-sheet"><div class="bs-handle"></div><div class="bs-content">
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:4px"><span class="bs-addr">이목동 100-3</span><span class="badge badge-unsurveyed">미조사</span></div>
    <div class="bs-meta">HIGH &middot; 기한 2026-06-15</div>
    <div style="text-align:right"><span class="bs-action">조사 시작 &#8250;</span></div>
  </div></div>
</div>
