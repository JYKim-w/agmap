<link rel="stylesheet" href="../base.css">
<style>
.btn{display:flex;align-items:center;justify-content:center;height:56px;border-radius:var(--btn-r);font-size:16px;font-weight:600;border:none;cursor:pointer;width:100%;background:var(--primary-600);color:var(--white)}
.form-input{width:100%;height:var(--input-h);border:1.5px solid var(--gray-300);border-radius:var(--input-r);padding:0 var(--md);font-size:15px;outline:none}
.form-input::placeholder{color:var(--gray-400)}
.login-logo{text-align:center;margin-bottom:48px}
.login-logo .icon{width:72px;height:72px;border-radius:18px;background:var(--primary-600);color:var(--white);display:flex;align-items:center;justify-content:center;font-size:28px;font-weight:700;margin:0 auto 12px}
.login-logo .title{font-size:24px;font-weight:700}.login-logo .sub{font-size:14px;color:var(--gray-600);margin-top:4px}
</style>
<div style="max-width:340px;margin:auto;padding:0 var(--lg);display:flex;flex-direction:column;justify-content:center;min-height:600px">
  <div class="login-logo"><div class="icon">AG</div><div class="title">농지현장조사</div><div class="sub">현장 조사원 전용 앱</div></div>
  <div style="display:flex;flex-direction:column;gap:var(--md)">
    <input class="form-input" placeholder="아이디" value="surveyor01">
    <input class="form-input" type="password" placeholder="비밀번호" value="test1234">
    <button class="btn">로그인</button>
  </div>
</div>
